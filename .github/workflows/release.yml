name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version-file: .tool-versions
          cache: npm

      - run: npm ci

      - run: npm run build
        env:
          VITE_NUTRIENT_LICENSE_KEY: ${{ secrets.VITE_NUTRIENT_LICENSE_KEY }}

      - name: Rename asset to stable filename
        run: |
          cp build/nutrient-pdf-editor-mcp-*.mcpb build/nutrient-pdf-editor-mcp.mcpb

      - name: Create GitHub Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "${{ github.ref_name }}" \
            build/nutrient-pdf-editor-mcp.mcpb \
            --title "${{ github.ref_name }}" \
            --notes-file CHANGELOG.md \
            --verify-tag
